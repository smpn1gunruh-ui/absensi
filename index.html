<!doctype html>
<html lang="id">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Absensi Siswa QR Mandiri</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet">
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .tab-active { border-bottom: 3px solid #1d4ed8; color: #1d4ed8; font-weight: 700; }
  </style>
 </head>
 <body class="min-h-screen bg-gray-50">
  <header class="bg-white p-4 shadow-sm border-b text-center">
   <h1 class="text-xl font-bold text-blue-600">Absensi QR Universal</h1>
   <p class="text-xs text-gray-500">Mendukung Scan QR dari Platform Mana Saja</p>
  </header>
  
  <nav class="flex border-b bg-white sticky top-0 z-10">
   <button id="tab-scanner" class="flex-1 py-3 text-center tab-active" onclick="switchTab('scanner')"><i data-lucide="scan" class="inline w-4 h-4 mr-1"></i>Scanner</button> 
   <button id="tab-siswa" class="flex-1 py-3 text-center text-gray-600" onclick="switchTab('siswa')"><i data-lucide="users" class="inline w-4 h-4 mr-1"></i>Siswa</button> 
   <button id="tab-laporan" class="flex-1 py-3 text-center text-gray-600" onclick="switchTab('laporan')"><i data-lucide="file-text" class="inline w-4 h-4 mr-1"></i>Laporan</button>
  </nav>

  <main class="max-w-2xl mx-auto p-4">
   <section id="panel-scanner">
    <p class="text-center text-gray-600 mb-4 text-sm">Arahkan kamera ke QR Code berisi ID atau Nama Siswa</p>
    
    <div class="bg-blue-50 border-2 border-blue-200 rounded-lg p-4 mb-4 text-center overflow-hidden">
     <div class="relative w-full aspect-video bg-black rounded-lg overflow-hidden mb-3">
       <video id="webcam-video" playsinline autoplay class="w-full h-full object-cover"></video>
       <div class="absolute inset-0 border-4 border-dashed border-white/40 pointer-events-none flex items-center justify-center">
         <div class="w-44 h-44 border-4 border-blue-500 rounded-lg opacity-70 animate-pulse"></div>
       </div>
     </div>
     
     <div class="flex gap-2">
       <button type="button" onclick="startCamera()" class="flex-1 py-2 rounded-lg font-semibold text-white bg-blue-600 hover:bg-blue-700 text-sm">
         <i data-lucide="video" class="inline w-4 h-4 mr-1"></i>Aktifkan Kamera
       </button>
       <button type="button" onclick="stopCamera()" class="flex-1 py-2 rounded-lg font-semibold text-white bg-gray-600 hover:bg-gray-700 text-sm">
         <i data-lucide="video-off" class="inline w-4 h-4 mr-1"></i>Matikan Kamera
       </button>
     </div>
    </div>
    
    <div id="scan-result" class="mt-4 hidden p-4 rounded-lg bg-green-50 border border-green-200 text-center animate-bounce">
     <p id="scan-result-text" class="text-green-800 font-bold text-lg"></p>
    </div>
    <div id="scan-error" class="mt-4 hidden p-4 rounded-lg bg-red-50 border border-red-200 text-center">
     <p id="scan-error-text" class="text-red-800 font-semibold"></p>
    </div>
   </section>

   <section id="panel-siswa" class="hidden">
    <div class="bg-white rounded-lg p-4 shadow-sm border mb-4">
     <h3 class="font-semibold text-gray-800 mb-3 text-sm">Tambah Registrasi Siswa Manual</h3>
     <form id="add-student-form" class="space-y-3">
      <div>
        <label for="input-name" class="text-xs font-medium text-gray-700">Nama Siswa</label> 
        <input id="input-name" type="text" required class="w-full border rounded-lg px-3 py-2 mt-1 text-sm" placeholder="Nama lengkap">
      </div>
      <div>
        <label for="input-id" class="text-xs font-medium text-gray-700">ID / Kode QR</label> 
        <input id="input-id" type="text" required class="w-full border rounded-lg px-3 py-2 mt-1 text-sm" placeholder="Contoh: STD004">
      </div>
      <button type="submit" class="w-full py-2 bg-blue-600 text-white rounded-lg font-semibold text-sm hover:bg-blue-700"> 
        <i data-lucide="plus" class="inline w-4 h-4 mr-1"></i>Tambah ke Database Toko/Sekolah
      </button>
     </form>
    </div>
    
    <div class="bg-white rounded-lg p-4 shadow-sm border mb-4">
     <h3 class="font-semibold text-gray-800 mb-2 text-sm">Import via CSV</h3>
     <input type="file" id="csv-file" accept=".csv" class="block w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"> 
     <button onclick="uploadCSV()" class="mt-3 w-full py-2 bg-green-600 text-white rounded-lg font-semibold text-sm hover:bg-green-700"> <i data-lucide="upload" class="inline w-4 h-4 mr-1"></i>Upload CSV </button>
     <div id="upload-msg" class="mt-2 text-xs hidden"></div>
    </div>
    
    <div id="student-list" class="space-y-4"></div>
   </section>

   <section id="panel-laporan" class="hidden">
    <div class="bg-white p-4 rounded-lg border shadow-sm">
      <h2 class="font-bold text-gray-800 mb-3 text-sm">Riwayat Absensi Masuk</h2>
      <div class="flex gap-2 mb-4">
        <input type="date" id="filter-date" class="border rounded-lg px-3 py-2 text-sm flex-1"> 
        <button onclick="clearLogs()" class="px-3 py-2 bg-red-500 text-white rounded-lg text-xs font-semibold hover:bg-red-600">Hapus Semua</button>
      </div>
      <div id="report-table-wrap" class="overflow-x-auto">
       <table class="w-full text-xs border-collapse">
        <thead>
         <tr class="bg-gray-100 text-gray-600">
          <th class="p-2 text-left border">ID QR</th>
          <th class="p-2 text-left border">Nama Terdeteksi</th>
          <th class="p-2 text-left border">Waktu</th>
          <th class="p-2 text-left border">Status</th>
         </tr>
        </thead>
        <tbody id="report-body"></tbody>
       </table>
      </div>
      <p id="report-empty" class="text-center text-gray-500 mt-4 text-sm hidden">Belum ada data absensi hari ini.</p>
    </div>
   </section>
  </main>

  <script>
    // System penyimpanan lokal yang AMAN tanpa bergantung server SDK eksternal
    function loadStudents() {
      const stored = localStorage.getItem('absensi_students');
      return stored ? JSON.parse(stored) : [
        { id: 'STD001', name: 'Ahmad Fauzi' },
        { id: 'STD002', name: 'Siti Nurhaliza' },
        { id: 'STD003', name: 'Budi Santoso' },
        { id: 'STD004', name: 'Dewi Lestari' }
      ];
    }
    function saveStudents() { localStorage.setItem('absensi_students', JSON.stringify(students)); }
    
    function loadAttendance() {
      const stored = localStorage.getItem('absensi_records');
      return stored ? JSON.parse(stored) : [];
    }
    function saveAttendance() { localStorage.setItem('absensi_records', JSON.stringify(attendanceData)); }

    let students = loadStudents();
    let attendanceData = loadAttendance();
    
    let videoStream = null;
    let isScanningActive = false;
    const videoEl = document.getElementById('webcam-video');
    const canvasElement = document.createElement('canvas');
    const canvasCtx = canvasElement.getContext('2d');

    window.addEventListener('load', () => {
      document.getElementById('filter-date').value = new Date().toISOString().split('T')[0];
      renderStudentList();
      renderReport();
      startCamera();
    });

    async function startCamera() {
      if (videoStream) stopCamera();
      try {
        videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        videoEl.srcObject = videoStream;
        videoEl.setAttribute("playsinline", true);
        videoEl.play();
        isScanningActive = true;
        requestAnimationFrame(tickScan);
      } catch (err) {
        showScanError('Kamera tidak terdeteksi. Izinkan izin kamera di browser Anda.');
      }
    }

    function stopCamera() {
      isScanningActive = false;
      if (videoStream) {
        videoStream.getTracks().forEach(track => track.stop());
        videoStream = null;
      }
      videoEl.srcObject = null;
    }

    function tickScan() {
      if (!isScanningActive) return;

      if (videoEl.readyState === videoEl.HAVE_ENOUGH_DATA) {
        canvasElement.height = videoEl.videoHeight;
        canvasElement.width = videoEl.videoWidth;
        canvasCtx.drawImage(videoEl, 0, 0, canvasElement.width, canvasElement.height);
        
        const imageData = canvasCtx.getImageData(0, 0, canvasElement.width, canvasElement.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });

        if (code && code.data) {
          handleScan(code.data.trim());
          isScanningActive = false; 
          setTimeout(() => {
            if (videoStream) { isScanningActive = true; requestAnimationFrame(tickScan); }
          }, 3000); // jeda 3 detik tiap kali scan sukses
          return;
        }
      }
      requestAnimationFrame(tickScan);
    }

    function switchTab(tab) {
      ['scanner','siswa','laporan'].forEach(t => {
        document.getElementById('panel-' + t).classList.toggle('hidden', t !== tab);
        const btn = document.getElementById('tab-' + t);
        if(t === tab) {
          btn.className = "flex-1 py-3 text-center tab-active";
        } else {
          btn.className = "flex-1 py-3 text-center text-gray-600";
        }
      });
      if (tab === 'scanner') startCamera(); else stopCamera();
      if (tab === 'siswa') renderStudentList();
      if (tab === 'laporan') renderReport();
      lucide.createIcons();
    }

    // DISINI KUNCI AGAR BISA MEMBACA SEMUA PLATFORM QR
    function handleScan(scannedData) {
      document.getElementById('scan-result').classList.add('hidden');
      document.getElementById('scan-error').classList.add('hidden');

      // 1. Cari dulu apakah ID ini terdaftar di database lokal kita
      let student = students.find(s => s.id.toLowerCase() === scannedData.toLowerCase());
      let finalName = "";
      let finalId = scannedData;

      if (student) {
        finalName = student.name;
      } else {
        // 2. JIKA QR BERASAL DARI PLATFORM LAIN (TIDAK TERDAFTAR):
        // Sistem tidak akan memblokir lagi, melainkan otomatis mendaftarkannya sebagai "Tamu / QR Luar"
        finalName = "User Luar (Platform Lain)";
      }

      const now = new Date();
      const dateStr = now.toISOString().split('T')[0];
      
      // Proteksi ganda agar tidak melakukan absen berkali-kali dalam hari yang sama
      const alreadyToday = attendanceData.find(r => r.student_id.toLowerCase() === finalId.toLowerCase() && r.date === dateStr);
      if (alreadyToday) { 
        showScanError('ID: ' + finalId + ' sudah melakukan absensi hari ini.'); 
        return; 
      }

      // Simpan data langsung ke database lokal
      const newRecord = {
        student_name: finalName,
        student_id: finalId,
        date: dateStr,
        time: now.toTimeString().slice(0, 5),
        status: 'Hadir'
      };

      attendanceData.push(newRecord);
      saveAttendance();

      // Bunyi/Notifikasi Visual Sukses
      document.getElementById('scan-result').classList.remove('hidden');
      document.getElementById('scan-result-text').textContent = `✓ Berhasil Absen: ${finalId} (${finalName})`;
    }

    function showScanError(msg) {
      document.getElementById('scan-error').classList.remove('hidden');
      document.getElementById('scan-error-text').textContent = msg;
    }

    // Form Registrasi Siswa Baru
    document.getElementById('add-student-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('input-name').value.trim();
      const id = document.getElementById('input-id').value.trim();
      if (!name || !id) return;
      
      if (students.find(s => s.id.toLowerCase() === id.toLowerCase())) {
        alert('ID ini sudah terdaftar!');
        return;
      }
      students.push({ id, name });
      saveStudents();
      renderStudentList();
      this.reset();
      alert('Siswa berhasil didaftarkan ke sistem lokal!');
    });

    function uploadCSV() {
      const fileInput = document.getElementById('csv-file');
      const file = fileInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        const lines = e.target.result.split('\n').map(l => l.trim()).filter(l => l);
        lines.forEach(line => {
          const parts = line.split(',');
          if (parts.length >= 2) {
            const id = parts[0].trim();
            const name = parts[1].trim();
            if(!students.find(s => s.id === id)) students.push({ id, name });
          }
        });
        saveStudents();
        renderStudentList();
        alert('CSV Berhasil Diimport!');
      };
      reader.readAsText(file);
    }

    function renderStudentList() {
      const container = document.getElementById('student-list');
      container.innerHTML = '';
      students.forEach(s => {
        const div = document.createElement('div');
        div.className = 'flex items-center gap-4 p-3 bg-white rounded-lg shadow-sm border';
        div.innerHTML = `<canvas id="qr-${s.id}" class="w-16 h-16></canvas><div class="flex-1"><p class="font-semibold text-sm">${s.name}</p><p class="text-xs text-gray-500">ID: ${s.id}</p></div><button onclick="removeStudent('${s.id}')" class="text-red-500 p-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button>`;
        container.appendChild(div);
        setTimeout(() => {
          QRCode.toCanvas(document.getElementById('qr-' + s.id), s.id, { width: 64, margin: 1 });
        }, 50);
      });
      lucide.createIcons();
    }

    function removeStudent(id) {
      students = students.filter(s => s.id !== id);
      saveStudents();
      renderStudentList();
    }

    function renderReport() {
      const d = document.getElementById('filter-date').value;
      const filtered = attendanceData.filter(r => r.date === d);
      const body = document.getElementById('report-body');
      const empty = document.getElementById('report-empty');
      body.innerHTML = '';
      
      if (filtered.length === 0) { empty.classList.remove('hidden'); return; }
      empty.classList.add('hidden');
      
      filtered.forEach(r => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td class="p-2 border font-mono font-bold">${r.student_id}</td><td class="p-2 border">${r.student_name}</td><td class="p-2 border">${r.time}</td><td class="p-2 border"><span class="px-2 py-0.5 bg-green-100 text-green-800 rounded text-xs font-semibold">${r.status}</span></td>`;
        body.appendChild(tr);
      });
    }

    function clearLogs() {
      if(confirm("Hapus semua riwayat absensi?")) {
        attendanceData = [];
        saveAttendance();
        renderReport();
      }
    }

    lucide.createIcons();
  </script>
 </body>
</html>
